<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4F46E5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="超纲词汇">
<link rel="manifest" href="manifest.json">
<title>《走遍美国》超纲词汇表</title>
<style>

  :root { --primary: #4F46E5; --primary-light: #E0E7FF; --bg: #F8FAFC; --card: #FFFFFF; --text: #1E293B; --text2: #64748B; --border: #E2E8F0; --high: #EF4444; --mid: #F59E0B; --low: #3B82F6; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
  .hero { background:linear-gradient(135deg,#4F46E5,#7C3AED); color:#fff; padding:2.5rem 1.5rem; text-align:center; }
  .hero h1 { font-size:1.8rem; font-weight:700; margin-bottom:0.4rem; }
  .hero p { font-size:0.95rem; opacity:0.9; max-width:620px; margin:0 auto; }
  .stats { display:flex; gap:0.8rem; justify-content:center; padding:1.2rem; flex-wrap:wrap; max-width:860px; margin:-1.8rem auto 0; position:relative; z-index:1; }
  .stat-card { background:var(--card); border-radius:10px; padding:1rem 1.2rem; box-shadow:0 4px 12px rgba(0,0,0,.08); text-align:center; flex:1; min-width:120px; }
  .stat-card .num { font-size:1.6rem; font-weight:700; }
  .stat-card .label { font-size:0.78rem; color:var(--text2); }
  .stat-high .num { color:var(--high); } .stat-mid .num { color:var(--mid); } .stat-low .num { color:var(--low); }
  .controls { max-width:900px; margin:1.5rem auto 0.8rem; padding:0 1.5rem; display:flex; gap:0.8rem; flex-wrap:wrap; align-items:center; }
  .search-box { flex:1; min-width:180px; padding:0.6rem 0.9rem; border:2px solid var(--border); border-radius:8px; font-size:0.9rem; outline:none; }
  .search-box:focus { border-color:var(--primary); }
  .fbtn { padding:0.4rem 0.9rem; border:2px solid var(--border); border-radius:8px; background:#fff; cursor:pointer; font-size:0.82rem; font-weight:500; transition:all .15s; }
  .fbtn:hover { border-color:var(--primary); color:var(--primary); }
  .fbtn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
  .container { max-width:900px; margin:0 auto; padding:0 1.5rem 1rem; display:flex; flex-direction:column; gap:1rem; }
  .card { background:var(--card); border-radius:12px; padding:1.2rem 1.5rem; box-shadow:0 2px 8px rgba(0,0,0,.06); border:1px solid var(--border); transition:transform .15s; }
  .card:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.1); }
  .card-header { display:flex; align-items:center; gap:0.6rem; flex-wrap:wrap; margin-bottom:0.5rem; }
  .word-idx { font-size:1.1rem; font-weight:600; color:var(--text2); min-width:2rem; }
  .word { font-size:1.35rem; font-weight:700; color:var(--primary); cursor:pointer; }
  .phonetic { font-size:1.35rem; color:var(--text2); font-style:normal; }
  .definition { font-size:1.05rem; color:#374151; margin:0.3rem 0 0.4rem; padding-left:0.5rem; border-left:3px solid var(--primary-light); }
  .episodes { font-size:0.8rem; color:var(--text2); margin-bottom:0.5rem; }
  .examples { display:flex; flex-direction:column; gap:0.4rem; }
  .example { display:flex; align-items:flex-start; gap:0.5rem; background:#F1F5F9; padding:0.5rem 0.8rem; border-radius:8px; font-size:1.20rem; font-weight:500; color:#1E293B; }
  .ex-text { flex:1; color:#1E293B; }
  .play-btn { background:var(--primary); color:#fff; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer; font-size:0.7rem; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; }
  .play-btn:hover { background:#4338CA; transform:scale(1.1); }
  .play-btn.ex-play { width:26px; height:26px; font-size:0.6rem; background:#10B981; }
  .play-btn.word-play { width:28px; height:28px; font-size:0.65rem; background:var(--primary); flex-shrink:0; }
  .play-btn.active-play { background:#DC2626 !important; animation: pulse 0.6s infinite alternate; }
  @keyframes pulse { from{transform:scale(1)} to{transform:scale(1.15)} }
  .play-btn.ex-play:hover { background:#059669; }
  .src-tag { font-size:0.7rem; padding:0.15rem 0.45rem; border-radius:4px; font-weight:500; }
  .src-tag.dict { background:#D1FAE5; color:#065F46; }
  .src-tag.tts { background:#FEF3C7; color:#92400E; }
  .freq-badge { font-size:0.72rem; padding:0.15rem 0.5rem; border-radius:4px; font-weight:600; }
  .freq-badge.high { background:#FEE2E2; color:#991B1B; }
  .freq-badge.mid { background:#FEF3C7; color:#92400E; }
  .freq-badge.low { background:#DBEAFE; color:#1E40AF; }
  .no-result { text-align:center; padding:3rem; color:var(--text2); font-size:1.1rem; }
  .pagination { max-width:900px; margin:0 auto 2rem; padding:0 1.5rem; display:flex; justify-content:center; align-items:center; gap:0.4rem; flex-wrap:wrap; }
  .page-btn { padding:0.4rem 0.75rem; border:2px solid var(--border); border-radius:8px; background:#fff; cursor:pointer; font-size:0.85rem; font-weight:500; transition:all .15s; min-width:36px; text-align:center; }
  .page-btn:hover { border-color:var(--primary); color:var(--primary); }
  .page-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
  .page-btn.disabled { opacity:0.4; cursor:not-allowed; pointer-events:none; }
  .page-info { font-size:0.85rem; color:var(--text2); margin:0 0.5rem; }
  @media(max-width:600px) { .hero h1{font-size:1.4rem;} .stats{gap:0.5rem;} .stat-card{min-width:90px;padding:0.7rem;} .card{padding:1rem;} .word{font-size:1.15rem;} .phonetic{font-size:1.15rem;} }


/* === Loading Overlay === */
#loader-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 99999; transition: opacity 0.5s;
}
#loader-overlay.fade-out { opacity: 0; pointer-events: none; }
#loader-overlay .loader-title {
  color: #fff; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem;
  letter-spacing: 0.05em;
}
#loader-overlay .loader-sub {
  color: rgba(255,255,255,0.8); font-size: 0.95rem; margin-bottom: 2rem;
}
#loader-overlay .loader-bar-wrap {
  width: 260px; height: 6px; background: rgba(255,255,255,0.2);
  border-radius: 3px; overflow: hidden;
}
#loader-overlay .loader-bar {
  width: 0%; height: 100%; background: #fff; border-radius: 3px;
  transition: width 0.3s;
}
#loader-overlay .loader-pct {
  color: rgba(255,255,255,0.9); font-size: 0.85rem; margin-top: 0.75rem;
}
#loader-overlay .loader-icon {
  font-size: 3rem; margin-bottom: 1rem;
}

/* === Audio loading hint === */
.audio-hint {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: rgba(79,70,229,0.92); color: #fff; padding: 8px 20px;
  border-radius: 20px; font-size: 0.85rem; z-index: 9998;
  white-space: nowrap; box-shadow: 0 4px 12px rgba(0,0,0,.2);
  transition: opacity 0.3s;
}

</style>
</head>
<body>

<div id="loader-overlay">
  <div class="loader-icon">📖</div>
  <div class="loader-title">《走遍美国》超纲词汇表</div>
  <div class="loader-sub" id="loader-msg">正在加载数据…</div>
  <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
  <div class="loader-pct" id="loader-pct">0%</div>
</div>

<div class="controls">
  <input class="search-box" id="search" placeholder="搜索单词或中文释义…" oninput="onSearchChange()">
  <button class="fbtn active" data-filter="all" onclick="setFilter(this)">全部</button>
  <button class="fbtn" data-filter="high" onclick="setFilter(this)">高频</button>
  <button class="fbtn" data-filter="mid" onclick="setFilter(this)">中频</button>
  <button class="fbtn" data-filter="low" onclick="setFilter(this)">低频</button>
  <button class="page-btn" id="stopBtn" onclick="stopPlay()" style="background:#EF4444;color:#fff;border-color:#EF4444;display:none">⏹ 停止</button>
</div>
<div class="container" id="cards"></div>
<div class="pagination" id="pagination"></div>
<audio id="audioPlayer" preload="auto"></audio>

<script>
// === App Logic ===
var PER_PAGE = 15;
var curPage = 1;
var curFilter = "all";
var curSearch = "";
var filteredCards = [];
var CARDS = [];
var waud = {};
var eaud = {};
var _waudLoaded = false;
var _eaudLoaded = false;

function getFiltered() {
  var s = curSearch.toLowerCase();
  return CARDS.filter(function(c) {
    if (curFilter !== "all" && c.freqClass !== curFilter) return false;
    if (s && c.word.toLowerCase().indexOf(s) === -1 && c.definition.toLowerCase().indexOf(s) === -1) return false;
    return true;
  });
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderCards() {
  filteredCards = getFiltered();
  var total = filteredCards.length;
  var totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (curPage > totalPages) curPage = totalPages;
  var start = (curPage - 1) * PER_PAGE;
  var end = Math.min(start + PER_PAGE, total);
  var pageCards = filteredCards.slice(start, end);

  var container = document.getElementById("cards");
  if (pageCards.length === 0) {
    container.innerHTML = '<div class="no-result">没有找到匹配的词汇</div>';
  } else {
    var h = '';
    for (var i = 0; i < pageCards.length; i++) {
      var c = pageCards[i];
      var origIdx = c.idx - 1;
      var srcTag = c.isDict ? '<span class="src-tag dict">词典发音</span>' : '<span class="src-tag tts">TTS</span>';
      var freqBadge = '<span class="freq-badge ' + c.freqClass + '">' + c.freqLabel + '</span>';
      var exHtml = '';
      for (var j = 0; j < c.examples.length; j++) {
        var ek = 'w' + origIdx + '_ex' + j;
        exHtml += '<div class="example"><span class="ex-text">' + escHtml(c.examples[j]) + '</span>';
        exHtml += '<button class="play-btn ex-play" data-ek="' + ek + '" onclick="playEx(this.dataset.ek)">&#9654;</button></div>';
      }
      h += '<div class="card">';
      h += '<div class="card-header">';
      h += '<span class="word-idx">' + c.idx + '</span><button class="play-btn word-play" data-idx="' + origIdx + '" onclick="playWord(parseInt(this.dataset.idx))">&#9654;</button>';
      h += '<span class="word">' + escHtml(c.word) + '</span>';
      h += '<span class="phonetic">' + escHtml(c.phonetic) + '</span>';
      h += freqBadge + srcTag;
      h += '</div>';
      h += '<div class="definition">' + escHtml(c.definition) + '</div>';
      h += '<div class="episodes">📍 ' + escHtml(c.episodes) + '</div>';
      if (c.examples.length > 0) {
        h += '<div class="examples">' + exHtml + '</div>';
      }
      h += '</div>';
    }
    container.innerHTML = h;
  }

  var pagDiv = document.getElementById("pagination");
  var pagHtml = '';
  pagHtml += '<button class="page-btn' + (curPage <= 1 ? ' disabled' : '') + '" onclick="goPage(' + (curPage-1) + ')">上一页</button>';
  var pStart = Math.max(1, curPage - 3);
  var pEnd = Math.min(totalPages, curPage + 3);
  if (pStart > 1) {
    pagHtml += '<button class="page-btn" onclick="goPage(1)">1</button>';
    if (pStart > 2) pagHtml += '<span class="page-info">…</span>';
  }
  for (var p = pStart; p <= pEnd; p++) {
    pagHtml += '<button class="page-btn' + (p === curPage ? ' active' : '') + '" onclick="goPage(' + p + ')">' + p + '</button>';
  }
  if (pEnd < totalPages) {
    if (pEnd < totalPages - 1) pagHtml += '<span class="page-info">…</span>';
    pagHtml += '<button class="page-btn" onclick="goPage(' + totalPages + ')">' + totalPages + '</button>';
  }
  pagHtml += '<button class="page-btn' + (curPage >= totalPages ? ' disabled' : '') + '" onclick="goPage(' + (curPage+1) + ')">下一页</button>';
  pagHtml += '<span class="page-info">第 ' + (start+1) + '-' + end + ' / ' + total + ' 词</span>';
  pagDiv.innerHTML = pagHtml;
}

// === Audio Playback ===
var _autoQueue = [];
var _autoIdx = 0;
var _loopCount = 0;
var _loopMax = 5;
var _pendingPlay = null; // Store pending play action for after eaud loads

function _playNext() {
  var audio = document.getElementById('audioPlayer');
  if (_autoIdx >= _autoQueue.length) { document.getElementById('stopBtn').style.display = 'none'; _highlightBtn(null); return; }
  var item = _autoQueue[_autoIdx];
  var b64 = item.src === 'word' ? waud[item.key] : eaud[item.key];
  if (!b64) { _autoIdx++; _loopCount = 0; _playNext(); return; }
  audio.src = 'data:audio/mp3;base64,' + b64;
  _highlightBtn(item);
  audio.onended = function() {
    _loopCount++;
    if (_loopCount < _loopMax) {
      setTimeout(function() { audio.currentTime = 0; audio.play(); }, 1000);
    } else {
      _loopCount = 0;
      _autoIdx++;
      setTimeout(function() { _playNext(); }, 1500);
    }
  };
  audio.play().catch(function() {});
  document.getElementById('stopBtn').style.display = 'inline-block';
}

function _highlightBtn(item) {
  document.querySelectorAll('.play-btn.active-play').forEach(function(b){b.classList.remove('active-play');});
  if (!item) return;
  var sel = item.src === 'word'
    ? '.play-btn.word-play[data-idx="' + item.dataIdx + '"]'
    : '.play-btn.ex-play[data-ek="' + item.key + '"]';
  var btn = document.querySelector(sel);
  if (btn) btn.classList.add('active-play');
}

function stopPlay() {
  var audio = document.getElementById('audioPlayer');
  audio.onended = null; audio.pause();
  audio.currentTime = 0;
  _autoQueue = [];
  _autoIdx = 0; _loopCount = 0;
  _highlightBtn(null);
  document.getElementById('stopBtn').style.display = 'none';
}

function _showHint(msg) {
  _hideHint();
  var d = document.createElement('div');
  d.className = 'audio-hint';
  d.id = 'audio-hint';
  d.textContent = msg;
  document.body.appendChild(d);
}
function _hideHint() {
  var d = document.getElementById('audio-hint');
  if (d) d.remove();
}

function playWord(idx) {
  // waud is always loaded (preloaded before page shows)
  var audio = document.getElementById('audioPlayer');
  audio.onended = null; audio.pause();
  _autoQueue = [];
  for (var i = idx; i < CARDS.length; i++) {
    var c = CARDS[i];
    if (!c) continue;
    _autoQueue.push({src:'word', key:'w'+i, dataIdx:i});
    for (var j = 0; j < c.examples.length; j++) {
      _autoQueue.push({src:'ex', key:'w'+i+'_ex'+j});
    }
  }
  _autoIdx = 0; _loopCount = 0;
  // If eaud not loaded, load it now but play word audio immediately
  if (!_eaudLoaded) {
    _loadEaud();
  }
  _playNext();
}

function playEx(key) {
  if (!_eaudLoaded) {
    _showHint('正在加载例句发音…');
    _pendingPlay = function() { _doPlayEx(key); };
    _loadEaud();
    return;
  }
  _doPlayEx(key);
}

function _doPlayEx(key) {
  _hideHint();
  var audio = document.getElementById('audioPlayer');
  audio.onended = null; audio.pause();
  var parts = key.split('_ex');
  var idx = parseInt(parts[0].substring(1));
  var exIdx = parseInt(parts[1]);
  var c = CARDS[idx];
  _autoQueue = [];
  if (c) {
    for (var j = exIdx; j < c.examples.length; j++) {
      _autoQueue.push({src:'ex', key:'w'+idx+'_ex'+j});
    }
    for (var i = idx + 1; i < CARDS.length; i++) {
      var nc = CARDS[i];
      if (!nc) continue;
      _autoQueue.push({src:'word', key:'w'+i, dataIdx:i});
      for (var j = 0; j < nc.examples.length; j++) {
        _autoQueue.push({src:'ex', key:'w'+i+'_ex'+j});
      }
    }
  }
  _autoIdx = 0; _loopCount = 0;
  _playNext();
}

function _loadEaud() {
  if (_eaudLoaded) { if (_pendingPlay) { _pendingPlay(); _pendingPlay = null; } return; }
  var s = document.createElement('script');
  s.src = 'eaud.js';
  s.onload = function() {
    _eaudLoaded = true;
    if (_pendingPlay) { _pendingPlay(); _pendingPlay = null; }
    else { _hideHint(); }
  };
  s.onerror = function() { _hideHint(); alert('例句发音加载失败，请检查网络'); _pendingPlay = null; };
  document.head.appendChild(s);
}

function goPage(p) {
  curPage = p;
  renderCards();
  window.scrollTo({top: document.querySelector('.container').offsetTop - 80, behavior: 'smooth'});
}

function setFilter(btn) {
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  curFilter = btn.getAttribute('data-filter');
  curPage = 1;
  renderCards();
}

function onSearchChange() {
  curSearch = document.getElementById('search').value;
  curPage = 1;
  renderCards();
}

// === Progressive Loading ===
// Step 1: Load cards.js (0.1MB) + waud.js (6MB) before showing page
// This ensures audio.play() works within user gesture context on mobile
function updateProgress(pct) {
  var bar = document.getElementById('loader-bar');
  var pctEl = document.getElementById('loader-pct');
  if (bar) bar.style.width = pct + '%';
  if (pctEl) pctEl.textContent = Math.round(pct) + '%';
}
function hideLoader() {
  var overlay = document.getElementById('loader-overlay');
  if (overlay) {
    overlay.classList.add('fade-out');
    setTimeout(function() { overlay.remove(); }, 500);
  }
}

function fetchWithProgress(url, onProgress) {
  return fetch(url).then(function(r) {
    if (!r.ok) throw new Error(url + ' load failed');
    var total = r.headers.get('content-length');
    if (!total) { onProgress(50); return r.text(); }
    var loaded = 0, totalN = parseInt(total);
    var reader = r.body.getReader();
    var decoder = new TextDecoder();
    var chunks = [];
    return reader.read().then(function process(result) {
      if (result.done) return chunks.join('');
      chunks.push(decoder.decode(result.value, {stream:true}));
      loaded += result.value.length;
      onProgress(Math.min(95, (loaded / totalN) * 100));
      return reader.read().then(process);
    });
  });
}

function execScript(text) {
  var s = document.createElement('script');
  s.textContent = text;
  document.head.appendChild(s);
}

// Load cards.js + waud.js in parallel, then show page
updateProgress(2);
var cardsLoaded = false;
var waudLoaded = false;

fetchWithProgress('cards.js', function(p) {
  if (!waudLoaded) updateProgress(p * 0.05); // cards is tiny, 5% weight
  else updateProgress(5 + p * 0.95);
}).then(function(text) {
  execScript(text);
  cardsLoaded = true;
  updateProgress(5);
  checkReady();
}).catch(function(e) {
  document.getElementById('loader-msg').textContent = '加载失败，请刷新重试';
  document.getElementById('loader-msg').style.color = '#ff6b6b';
});

document.getElementById('loader-msg').textContent = '正在加载词汇和单词发音…';
fetchWithProgress('waud.js', function(p) {
  if (!cardsLoaded) return;
  updateProgress(5 + p * 0.95);
}).then(function(text) {
  execScript(text);
  _waudLoaded = true;
  waudLoaded = true;
  checkReady();
}).catch(function(e) {
  document.getElementById('loader-msg').textContent = '单词发音加载失败，请刷新重试';
  document.getElementById('loader-msg').style.color = '#ff6b6b';
});

function checkReady() {
  if (cardsLoaded && waudLoaded) {
    updateProgress(100);
    setTimeout(function() {
      renderCards();
      hideLoader();
      // Preload eaud in background (23MB)
      var s = document.createElement('script');
      s.src = 'eaud.js';
      s.onload = function() { _eaudLoaded = true; };
      document.head.appendChild(s);
    }, 300);
  }
}

// === Service Worker Registration ===
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function(e) {
      console.log('SW registration failed:', e);
    });
  });
}
</script>
</body>
</html>
